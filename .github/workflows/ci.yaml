name: CI

env:
  # Current supported uv version. The uv documentation recommends pinning
  # this. The version should match the version used in .pre-commit-config.yaml
  # and frozen in uv.lock. It is updated by make update-deps.
  UV_VERSION: "0.11.21"

"on":
  merge_group: {}
  pull_request: {}
  push:
    branches-ignore:
      # These should always correspond to pull requests, so ignore them for
      # the push trigger and let them be triggered by the pull_request
      # trigger, avoiding running the workflow twice.  This is a minor
      # optimization so there's no need to ensure this is comprehensive.
      - "dependabot/**"
      - "gh-readonly-queue/**"
      - "renovate/**"
      - "tickets/**"
      - "u/**"
    tags:
      - "*"
  release:
    types: [published]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Run pre-commit
        run: uv run --only-group=lint pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for setuptools_scm

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      # Kafka is provided by testcontainers, which the nox test session starts
      # against the runner's Docker daemon. No docker-compose broker is needed.
      - name: Run nox
        run: uv run --only-group=nox nox -s typing test

  client-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for setuptools_scm

      # The client_test_compat and client_test_oldest sessions create their own
      # uv-backed virtualenvs for specific Python versions, so make those
      # interpreters available on the runner.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: |
            3.13
            3.14

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Run client tests
        run: >-
          uv run --only-group=nox nox -s
          client_test
          client_test_compat
          client_test_oldest

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          # Ensure the documentation gets the right version.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Update package lists
        run: sudo apt-get update

      - name: Install extra packages
        run: sudo apt install -y graphviz

      - name: Run nox
        run: uv run --only-group=nox nox -s docs

      # Only attempt documentation uploads for long-lived branches, tagged
      # releases, and pull requests from ticket branches.  This avoids version
      # clutter in the docs and failures when a PR doesn't have access to
      # secrets.
      - name: Upload to LSST the Docs
        uses: lsst-sqre/ltd-upload@v1
        with:
          project: squarebot
          dir: "docs/_build/html"
          username: ${{ secrets.LTD_USERNAME }}
          password: ${{ secrets.LTD_PASSWORD }}
        if: >
          github.event_name != 'merge_group'
          && (github.event_name != 'pull_request'
            || startsWith(github.head_ref, 'tickets/'))

  build:
    needs: [lint, test]
    secrets: inherit
    uses: lsst-sqre/multiplatform-build-and-push/.github/workflows/build.yaml@v4
    with:
      images: ghcr.io/${{ github.repository }}

    # Only do Docker builds of tagged releases and pull requests from ticket
    # branches.  This will still trigger on pull requests from untrusted
    # repositories whose branch names match our tickets/* branch convention,
    # but in this case the build will fail with an error since the secret
    # won't be set.
    if: >
      (github.event_name == 'release' && github.event.action == 'published')
      || (github.event_name != 'merge_group'
          && startsWith(github.head_ref, 'tickets/'))

  test-package:
    name: Test PyPI package build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for setuptools_scm

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      # rubin-squarebot is a uv workspace member, so build it by name from the
      # workspace root. uv writes a workspace member's artifacts to the root
      # dist/, so this can't use the build-and-publish-to-pypi action with
      # working-directory=client (the action's publish step would look in
      # client/dist/ and find nothing).
      - name: Build the client package
        run: uv build --no-sources --package rubin-squarebot

  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/rubin-squarebot
    permissions:
      id-token: write
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for setuptools_scm

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      # rubin-squarebot is a uv workspace member, so build it by name from the
      # workspace root. uv writes a workspace member's artifacts to the root
      # dist/ where uv publish looks; building from working-directory=client
      # would emit to the root dist/ but publish from client/dist/ and find
      # nothing (which is why the 0.10.1 release failed to upload to PyPI).
      - name: Build the client package
        run: uv build --no-sources --package rubin-squarebot

      - name: Publish to PyPI
        run: uv publish
